services:
  pumasamplermusic:
    container_name: pumasamplermusic
    build:
      context: .
      dockerfile: Dockerfile
    image: pumasamplermusic:latest
    restart: unless-stopped
    ports:
      - "4070:4070"
    environment:
      - TZ=America/Santiago
      - NODE_ENV=production
      - PORT=4070
      - DATA_DIR=/data
      - MAX_CACHE_GB=5
      # Temporary throttle-recovery measure: the server IP is currently in an
      # active 429 throttle state. Revert to 2 once it clears.
      - MAX_CONCURRENT_DOWNLOADS=1
      - POT_PROVIDER_URL=http://bgutil-provider:4416
      - COOKIES_FILE=/data/cookies.txt
      - YTDLP_CHANNEL=stable
    volumes:
      - ./data:/data
      - ./src:/app/src
    networks:
      - pumasamplermusic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4070/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: bgutil-provider
    init: true
    restart: unless-stopped
    networks:
      - pumasamplermusic-network

networks:
  pumasamplermusic-network:
    name: pumasamplermusic-network
    driver: bridge
